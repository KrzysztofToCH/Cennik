        const form = document.getElementById('filterForm');
        const categorySelect = document.getElementById('category');
        const searchInput = document.getElementById('search');
        const productContainer = document.getElementById('productContainer');

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function getMetaLabel(liters) {
            if (typeof liters !== 'string') {
                return 'Litraż';
            }
            if (liters.includes('kg')) {
                return 'Masa netto:';
            }
            if (liters.includes('szt')) {
                return 'Ilość sztuk';
            }
            return 'Litraż';
        }

        function createProductCard(product, index) {
            const categoryHtml = product.category ? `<p class="product-category">Kategoria: <strong>${escapeHtml(product.category)}</strong></p>` : '';
            const imageHtml = product.image ? `<img src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}">` : '';
            const thumbnailHtml = product.secondaryImage ? `
                        <div class="product-image-thumbnails">
                            <button type="button" class="thumbnail-button" data-image="${escapeHtml(product.secondaryImage)}" aria-label="Podgląd: ${escapeHtml(product.name)}">
                                <img src="${escapeHtml(product.secondaryImage)}" alt="${escapeHtml(product.name)} - miniatura">
                            </button>
                        </div>
                    ` : '';
            const price = Number(product.price).toFixed(2).replace('.', ',');
            const metaLabel = getMetaLabel(product.liters);
            const warrantyHtml = product.warranty ? `<p class="product-warranty"><strong>${escapeHtml(product.warranty)}</strong></p>` : '';

            return `
                <article class="product-card">
                    <div class="product-image-wrapper">
                        <div class="product-image">${imageHtml}</div>
                        ${thumbnailHtml}
                    </div>
                    <div class="product-info">
                        <h2><span class="product-number">${index + 1}.</span> ${escapeHtml(product.name)}</h2>
                        ${categoryHtml}
                        <p class="product-meta">${metaLabel}: <strong>${escapeHtml(product.liters)}</strong></p>
                        <p class="product-price"><strong>${escapeHtml(price)} zł</strong></p>
                        ${warrantyHtml}
                    </div>
                </article>
            `;
        }

        function renderProducts(data) {
            if (!data.products || data.products.length === 0) {
                productContainer.innerHTML = '<div class="empty-state"><h2>Brak produktów</h2></div>';
                return;
            }

            const cards = data.products.map(createProductCard).join('');
            productContainer.innerHTML = `<div class="product-grid">${cards}</div>`;
            attachThumbnailHover();
        }

        function attachThumbnailHover() {
            document.querySelectorAll('.product-card').forEach(function (card) {
                var mainImage = card.querySelector('.product-image img');
                if (!mainImage) {
                    return;
                }
                var defaultSrc = mainImage.src;
                card.querySelectorAll('.thumbnail-button').forEach(function (button) {
                    var hoverSrc = button.dataset.image;
                    button.addEventListener('mouseenter', function () {
                        mainImage.src = hoverSrc;
                    });
                    button.addEventListener('mouseleave', function () {
                        mainImage.src = defaultSrc;
                    });
                    button.addEventListener('focus', function () {
                        mainImage.src = hoverSrc;
                    });
                    button.addEventListener('blur', function () {
                        mainImage.src = defaultSrc;
                    });
                });
            });
        }

        function getFilteredProducts(category = '', searchTerm = '') {
            const normalizedSearch = String(searchTerm).trim().toLowerCase();

            return products.filter(product => {
                const matchesCategory = !category || product.category === category;
                const matchesSearch = !normalizedSearch || product.name.toLowerCase().includes(normalizedSearch);

                return matchesCategory && matchesSearch;
            });
        }

        function loadProducts(category = '', searchTerm = '') {
            const filteredProducts = getFilteredProducts(category, searchTerm);
            renderProducts({ products: filteredProducts });
        }

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            const selectedCategory = categorySelect.value;
            const searchQuery = searchInput.value.trim();
            loadProducts(selectedCategory, searchQuery);

            const params = new URLSearchParams();
            if (selectedCategory) {
                params.set('category', selectedCategory);
            }
            if (searchQuery) {
                params.set('search', searchQuery);
            }

            const url = params.toString() ? window.location.pathname + '?' + params.toString() : window.location.pathname;
            history.replaceState(null, '', url);
        });

        const searchParams = new URLSearchParams(window.location.search);
        const initialCategory = searchParams.get('category') || '';
        const initialSearch = searchParams.get('search') || '';

        categorySelect.value = initialCategory;
        searchInput.value = initialSearch;

        loadProducts(initialCategory, initialSearch);
    </script>
    <button type="button" class="scroll-top-button" aria-label="Powrót do góry">↑</button>
    <script>
        var scrollButton = document.querySelector('.scroll-top-button');
        function updateScrollButton() {
            if (!scrollButton) return;
            if (window.scrollY > 120) {
                scrollButton.classList.add('visible');
            } else {
                scrollButton.classList.remove('visible');
            }
        }
        if (scrollButton) {
            updateScrollButton();
            window.addEventListener('scroll', updateScrollButton);
            scrollButton.addEventListener('click', function () {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        
        // Po odświeżeniu strony zawsze ustawiamy pozycję na górze
        window.addEventListener('pageshow', function () {
            window.scrollTo(0, 0);
        });
        window.addEventListener('beforeunload', function () {
            window.scrollTo(0, 0);
        });
