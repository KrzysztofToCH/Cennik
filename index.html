        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

                        ${categoryHtml}
                        <p class="product-meta">Litraż: <strong>${escapeHtml(product.liters)}</strong></p>
                        <p class="product-price"><strong>${escapeHtml(price)} zł</strong></p>
                    </div>
                </article>
            `;
        }

        function renderProducts(data) {
            if (!data.products || data.products.length === 0) {
                productContainer.innerHTML = '<div class="empty-state"><h2>Brak produktów</h2></div>';
                return;
            }

            const cards = data.products.map(createProductCard).join('');
            productContainer.innerHTML = `<div class="product-grid">${cards}</div>`;
        }

        function getFilteredProducts(category = '') {
            if (!category) {
                return products;
            }
            return products.filter(product => product.category === category);
        }

        function loadProducts(category = '') {
            const filteredProducts = getFilteredProducts(category);
            renderProducts({ products: filteredProducts });
        }

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            const selectedCategory = categorySelect.value;
            loadProducts(selectedCategory);
            const url = selectedCategory ? '?category=' + encodeURIComponent(selectedCategory) : window.location.pathname;
            history.replaceState(null, '', url);
        });

        const searchParams = new URLSearchParams(window.location.search);
        const initialCategory = searchParams.get('category') || '';
        if (initialCategory) {
            categorySelect.value = initialCategory;
        }

        loadProducts(initialCategory);
    </script>
</body>
</html>
