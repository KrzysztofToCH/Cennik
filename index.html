<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prosty sklep</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1>Prosty sklep</h1>
        </div>
    </header>

    <main class="container">
        <div class="filter-bar">
            <form id="filterForm">
                <label for="category">Filtruj kategorię:</label>
                <select id="category" name="category">
                    <option value="">Wszystkie kategorie</option>
                    <option value="Chemia do prania">Chemia do prania</option>
                    <option value="Chemia do sprzątania">Chemia do sprzątania</option>
                    <option value="Artykuły spożywcze">Artykuły spożywcze</option>
                    <option value="inne">inne</option>
                </select>
                <button type="submit">Zastosuj</button>
            </form>
        </div>

        <div id="productContainer"></div>
    </main>

    <script>
        const products = [
            {
                name: 'Wino czerwone',
                liters: '0,75 l',
                price: 45.99,
                image: 'https://via.placeholder.com/400x300?text=Wino+czerwone',
                category: 'Artykuły spożywcze'
            },
            {
                name: 'Wino białe',
                liters: '0,75 l',
                price: 42.50,
                image: 'https://pro-fra-s3-productsassets.rossmann.pl/product_1_medium/398783_360_350_1727377319.webp',
                category: 'Artykuły spożywcze'
            },
            {
                name: 'Sok jabłkowy',
                liters: '1,0 l',
                price: 9.99,
                image: 'images/sok.jpg',
                category: 'Artykuły spożywcze'
            },
            {
                name: 'Piwo rzemieślnicze',
                liters: '0,5 l',
                price: 7.49,
                image: 'https://duzyben.pl/hpeciai/ca13e24935eb611f651dcf36acf40ce7/pol_pl_PIWO-HARNAS-0-5L-BUT-ZW-50_1_1.jpg',
                category: 'Artykuły spożywcze'
            },
            {
                name: 'Olej z oliwek',
                liters: '0,5 l',
                price: 27.90,
                image: 'https://via.placeholder.com/400x300?text=Olej+z+oliwek',
                category: 'Artykuły spożywcze'
            },
            {
                name: 'Woda mineralna',
                liters: '1,5 l',
                price: 4.20,
                image: 'https://via.placeholder.com/400x300?text=Woda+mineralna',
                category: 'Artykuły spożywcze'
            }
        ];

        const form = document.getElementById('filterForm');
        const categorySelect = document.getElementById('category');
        const productContainer = document.getElementById('productContainer');

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function createProductCard(product) {
            const categoryHtml = product.category ? `<p class="product-category">Kategoria: <strong>${escapeHtml(product.category)}</strong></p>` : '';
            const imageHtml = product.image ? `<img src="${escapeHtml(product.image)}" alt="${escapeHtml(product.name)}">` : '';
            const price = Number(product.price).toFixed(2).replace('.', ',');

            return `
                <article class="product-card">
                    <div class="product-image">${imageHtml}</div>
                    <div class="product-info">
                        <h2>${escapeHtml(product.name)}</h2>
                        ${categoryHtml}
                        <p class="product-meta">Litraż: <strong>${escapeHtml(product.liters)}</strong></p>
                        <p class="product-price"><strong>${escapeHtml(price)} zł</strong></p>
                    </div>
                </article>
            `;
        }

        function renderProducts(data) {
            if (!data.products || data.products.length === 0) {
                productContainer.innerHTML = '<div class="empty-state"><h2>Brak produktów</h2></div>';
                return;
            }

            const cards = data.products.map(createProductCard).join('');
            productContainer.innerHTML = `<div class="product-grid">${cards}</div>`;
        }

        function getFilteredProducts(category = '') {
            if (!category) {
                return products;
            }
            return products.filter(product => product.category === category);
        }

        function loadProducts(category = '') {
            const filteredProducts = getFilteredProducts(category);
            renderProducts({ products: filteredProducts });
        }

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            const selectedCategory = categorySelect.value;
            loadProducts(selectedCategory);
            const url = selectedCategory ? '?category=' + encodeURIComponent(selectedCategory) : window.location.pathname;
            history.replaceState(null, '', url);
        });

        const searchParams = new URLSearchParams(window.location.search);
        const initialCategory = searchParams.get('category') || '';
        if (initialCategory) {
            categorySelect.value = initialCategory;
        }

        loadProducts(initialCategory);
    </script>
</body>
</html>
